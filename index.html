<!DOCTYPE html>
<html>
<head>

<title>Temperature Converter</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#eaeaea;
}

.container{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:10px;
}

input,button{
width:90%;
padding:10px;
margin:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Temperature Converter</h2>

<input type="number" id="temp" placeholder="Celsius">

<button onclick="convert()">Convert to Fahrenheit</button>

<h3 id="result"></h3>

</div>

<script>

function convert(){

let c=document.getElementById("temp").value;

let f=(c*9/5)+32;

document.getElementById("result").innerHTML="Fahrenheit : "+f;

}

</script>

</body>
</html>
